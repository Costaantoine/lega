version: "3.8"

networks:
  bvi-net:
    driver: bridge
    name: bvi_bvi-net

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - bvi-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./bvi-api
    restart: always
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: INFO
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SITE_MANAGEMENT_MODE: ${SITE_MANAGEMENT_MODE:-manual}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      SEARXNG_URL: ${SEARXNG_URL:-http://bvi-searxng-1:8080}
      TTS_ENABLED: ${TTS_ENABLED:-false}
      AVATAR_ENABLED: ${AVATAR_ENABLED:-false}
      AIIA_ENDPOINT: ${AIIA_ENDPOINT:-http://localhost:8003/tts}
      BRIEF_HOUR: ${BRIEF_HOUR:-7}
      BRIEF_MINUTE: ${BRIEF_MINUTE:-0}
    volumes:
      - ./docs:/app/docs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - bvi-net
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    image: node:20-alpine
    restart: always
    ports:
      - "3000:3000"
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm run dev"
    volumes:
      - ./bvi-dashboard:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://76.13.141.221:8002/api
      NEXT_PUBLIC_WS_URL: ws://76.13.141.221:8002/ws
      NODE_ENV: development
    networks:
      - bvi-net
    depends_on:
      - api

  shop:
    image: node:20-alpine
    restart: always
    ports:
      - "3001:3000"
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm run dev"
    volumes:
      - ./bvi-shop:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://76.13.141.221:8002/api
      NODE_ENV: development
    networks:
      - bvi-net
    depends_on:
      - api

  searxng:
    image: searxng/searxng:2025.2.2-ab1e895cc
    container_name: bvi-searxng-1
    restart: always
    ports:
      - "8888:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    networks:
      - bvi-net
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/

volumes:
  pg_data:
