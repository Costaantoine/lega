networks:
  coolify:
    external: true
  lega-vitrine-net:
    driver: bridge

services:
  lega-backend:
    build:
      context: ./vitrine/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SITE_BASE_URL: ${SITE_BASE_URL:-https://lega.newappai.com}
      JWT_SECRET_CLIENT: ${JWT_SECRET_CLIENT:-lega-client-secret-2026}
      BVI_API_URL: ${BVI_API_URL:-http://bvi-api-1:8000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    volumes:
      - lega-uploads:/app/uploads
    networks:
      - lega-vitrine-net
      - coolify

  lega-frontend:
    build:
      context: ./vitrine/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_SITE_API_URL: ${NEXT_PUBLIC_SITE_API_URL:-https://lega.newappai.com/api/site}
      NEXT_PUBLIC_SITE_BASE_URL: ${NEXT_PUBLIC_SITE_BASE_URL:-https://lega.newappai.com}
      NEXT_PUBLIC_BVI_WS_URL: ${NEXT_PUBLIC_BVI_WS_URL:-}
      SITE_API_URL: http://lega-backend:8000
    networks:
      - lega-vitrine-net
      - coolify
    depends_on:
      - lega-backend

volumes:
  lega-uploads:
    driver: local
